<div>
  <h2 class="heading-sm" style="margin-bottom:var(--space-8);">Налаштування</h2>
  <form method="post" action="{% url 'accounts:cabinet' %}" style="max-width:480px;">
    {% csrf_token %}
    <input type="hidden" name="action" value="change_password">
    <div style="display:flex; flex-direction:column; gap:var(--space-5);">
      <h3 style="font-size:var(--font-size-md); font-weight:var(--font-weight-semi);">Зміна паролю</h3>
      <div class="form-group">
        <label class="form-label">Поточний пароль</label>
        <input class="form-input" type="password" name="old_password" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label class="form-label">Новий пароль</label>
        <input class="form-input" type="password" name="new_password1" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Підтвердити новий пароль</label>
        <input class="form-input" type="password" name="new_password2" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-dark" style="align-self:flex-start;">Змінити пароль</button>
    </div>
  </form>
</div>
