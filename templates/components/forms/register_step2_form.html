<form
  method="post"
  action="{% url 'accounts:register_step2' %}"
  hx-post="{% url 'accounts:register_step2' %}"
  hx-target="#modal-register-content"
  hx-swap="innerHTML"
  class="auth-form"
>
  {% csrf_token %}
  <p class="auth-form__step">Крок 2 / 2</p>
  <h2 class="auth-form__title">Додаткова інформація</h2>

  <div class="form-group">
    <label class="form-label" for="reg_phone">Телефон</label>
    <input class="form-input" type="tel" id="reg_phone" name="phone"
           placeholder="+380 XX XXX XX XX" autocomplete="tel">
  </div>

  <div class="form-group">
    <label class="form-label" for="reg_role">Вид діяльності</label>
    <select class="form-input auth-form__select" id="reg_role" name="role">
      <option value="">Оберіть…</option>
      <option value="vet">Ветеринарний лікар</option>
      <option value="student">Студент ветеринарного факультету</option>
      <option value="owner">Власник домашньої тварини</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label" for="reg_password2">Підтвердити пароль</label>
    <input class="form-input" type="password" id="reg_password2" name="password2"
           placeholder="Повторіть пароль" autocomplete="new-password" required>
  </div>

  <button type="submit" class="btn btn-red auth-form__submit">Зареєструватись</button>
</form>
