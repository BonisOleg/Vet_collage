<form
  method="post"
  action="{% url 'accounts:register_step1' %}"
  hx-post="{% url 'accounts:register_step1' %}"
  hx-target="#modal-register-content"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  <p class="label" style="color:var(--color-red); margin-bottom:var(--space-2);">Крок 1 / 2</p>
  <h2 class="heading-sm" style="margin-bottom: var(--space-6);">Реєстрація</h2>

  <div class="form-group" style="margin-bottom: var(--space-4);">
    <label class="form-label" for="reg_first_name">Ім'я</label>
    <input class="form-input" type="text" id="reg_first_name" name="first_name"
           placeholder="Ваше ім'я" autocomplete="given-name" required>
  </div>

  <div class="form-group" style="margin-bottom: var(--space-4);">
    <label class="form-label" for="reg_last_name">Прізвище</label>
    <input class="form-input" type="text" id="reg_last_name" name="last_name"
           placeholder="Ваше прізвище" autocomplete="family-name" required>
  </div>

  <div class="form-group" style="margin-bottom: var(--space-4);">
    <label class="form-label" for="reg_email">Email</label>
    <input class="form-input" type="email" id="reg_email" name="email"
           placeholder="your@email.com" autocomplete="email" required>
  </div>

  <div class="form-group" style="margin-bottom: var(--space-6);">
    <label class="form-label" for="reg_password">Пароль</label>
    <input class="form-input" type="password" id="reg_password" name="password1"
           placeholder="Мінімум 8 символів" autocomplete="new-password" required>
  </div>

  <button type="submit" class="btn btn-red" style="width:100%;">Далі →</button>

  <p style="margin-top:var(--space-5); text-align:center; font-size:var(--font-size-sm); color:var(--color-gray-mid);">
    Вже маєте акаунт?
    <button type="button" style="color:var(--color-red); font-weight:var(--font-weight-medium);"
            onclick="document.getElementById('modal-register').style.display='none'; document.getElementById('modal-login').style.display='flex'">
      Увійти
    </button>
  </p>
</form>
