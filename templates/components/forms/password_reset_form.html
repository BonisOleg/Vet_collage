<form
  method="post"
  action="{% url 'accounts:password_reset' %}"
  hx-post="{% url 'accounts:password_reset' %}"
  hx-target="#modal-login-content"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  <h2 class="heading-sm" style="margin-bottom:var(--space-3);">Забули пароль?</h2>
  <p style="font-size:var(--font-size-sm); color:var(--color-gray-mid); margin-bottom:var(--space-6);">
    Введіть email, і ми надішлемо вам код для відновлення паролю.
  </p>

  <div class="form-group" style="margin-bottom:var(--space-6);">
    <label class="form-label" for="reset_email">Email</label>
    <input class="form-input" type="email" id="reset_email" name="email"
           placeholder="your@email.com" autocomplete="email" required>
  </div>

  <button type="submit" class="btn btn-red" style="width:100%;">Надіслати код</button>

  <p style="margin-top:var(--space-5); text-align:center; font-size:var(--font-size-sm); color:var(--color-gray-mid);">
    <button type="button" style="color:var(--color-red); font-weight:var(--font-weight-medium);"
            hx-get="{% url 'accounts:login' %}"
            hx-target="#modal-login-content"
            hx-swap="innerHTML">
      ← Повернутись до входу
    </button>
  </p>
</form>
