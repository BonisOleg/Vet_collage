<form
  method="post"
  action="{% url 'accounts:password_reset' %}"
  hx-post="{% url 'accounts:password_reset' %}"
  hx-target="#modal-login-content"
  hx-swap="innerHTML"
  class="auth-form"
>
  {% csrf_token %}
  <h2 class="auth-form__title">Забули пароль?</h2>
  <p class="auth-form__hint">
    Введіть email, і ми надішлемо вам код для відновлення паролю.
  </p>

  <div class="form-group">
    <label class="form-label" for="reset_email">Email</label>
    <input class="form-input" type="email" id="reset_email" name="email"
           placeholder="your@email.com" autocomplete="email" required>
  </div>

  <button type="submit" class="btn btn-red auth-form__submit">Надіслати код</button>

  <p class="auth-form__switch">
    <button type="button" class="auth-form__switch-link"
            hx-get="{% url 'accounts:login' %}"
            hx-target="#modal-login-content"
            hx-swap="innerHTML">
      ← Повернутись до входу
    </button>
  </p>
</form>
