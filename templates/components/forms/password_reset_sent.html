<div class="auth-form auth-form--centered">
  <div class="auth-form__icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-dark)" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h2 class="auth-form__title">Код надісланий</h2>
  <p class="auth-form__hint">
    Перевірте вашу пошту. Ми надіслали код для відновлення паролю.
  </p>
  <button type="button" class="btn btn-dark auth-form__submit"
          hx-get="{% url 'accounts:login' %}"
          hx-target="#modal-login-content"
          hx-swap="innerHTML">
    Повернутись до входу
  </button>
</div>
