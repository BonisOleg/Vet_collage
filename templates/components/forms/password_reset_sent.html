<div style="text-align:center; padding:var(--space-8) 0;">
  <div style="width:64px; height:64px; background:var(--color-cream); border-radius:var(--radius-full); display:flex; align-items:center; justify-content:center; margin:0 auto var(--space-6);">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--color-dark)" stroke-width="2">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h2 class="heading-sm" style="margin-bottom:var(--space-3);">Код надісланий</h2>
  <p style="font-size:var(--font-size-sm); color:var(--color-gray-mid); margin-bottom:var(--space-6); max-width:300px; margin-inline:auto;">
    Перевірте вашу пошту. Ми надіслали код для відновлення паролю.
  </p>
  <button type="button" class="btn btn-dark" style="width:100%;"
          hx-get="{% url 'accounts:login' %}"
          hx-target="#modal-login-content"
          hx-swap="innerHTML">
    Повернутись до входу
  </button>
</div>
