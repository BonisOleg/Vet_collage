{% load static %}
<aside class="cabinet__sidebar">
  {% if user.is_authenticated %}
  <div class="cabinet__user">
    <div class="cabinet__avatar">
      <img src="{% static 'images/account-icon.svg' %}" alt="{{ user.get_full_name }}" width="64" height="64">
    </div>
    <h2 class="cabinet__username">{{ user.get_full_name|default:user.email }}</h2>
    <p class="cabinet__user-email">{{ user.email }}</p>
  </div>
  {% endif %}

  <nav class="cabinet__nav">
    <a href="{% url 'accounts:cabinet' %}" class="cabinet__nav-link {% if sidebar_active == 'account' %}is-active{% endif %}">Мій аккаунт</a>
    <a href="{% url 'accounts:cabinet' %}?tab=profile" class="cabinet__nav-link {% if sidebar_active == 'profile' %}is-active{% endif %}">Налаштування</a>
    <a href="{% url 'membership:index' %}" class="cabinet__nav-link {% if sidebar_active == 'membership' %}is-active{% endif %}">Членство</a>
    <a href="{% url 'accounts:cabinet' %}?tab=courses" class="cabinet__nav-link {% if sidebar_active == 'courses' %}is-active{% endif %}">Мої курси</a>
    <a href="{% url 'accounts:cabinet' %}?tab=webinars" class="cabinet__nav-link {% if sidebar_active == 'webinars' %}is-active{% endif %}">Мої вебінари</a>
    <a href="#" class="cabinet__nav-link">Історія покупок</a>
    <a href="#" class="cabinet__nav-link">Ресурси</a>
    <a href="#" class="cabinet__nav-link">Кар'єра</a>
    <a href="{% url 'accounts:logout' %}" class="cabinet__nav-link cabinet__nav-link--logout">Вийти</a>
  </nav>
</aside>
