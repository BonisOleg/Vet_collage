<article class="course-card">
  <div class="course-card__image">
    {% if course.cover %}
      <img src="{{ course.cover.url }}" alt="{{ course.title }}" loading="lazy">
    {% else %}
      <div class="course-card__image-placeholder"></div>
    {% endif %}
  </div>
  <div class="course-card__body">
    {% if course.category %}
      <span class="course-card__tag">{{ course.category.name }}</span>
    {% endif %}
    <h3 class="course-card__title">{{ course.title }}</h3>
    <div class="course-card__meta">
      {% if course.duration_hours %}
        <span>{{ course.duration_hours }} год</span>
      {% endif %}
      <span>{{ course.get_level_display }}</span>
    </div>
    <div class="course-card__footer">
      <span class="course-card__price">€{{ course.price }}</span>
      <a href="{% url 'courses:detail' course.slug %}" class="btn btn-red btn-sm">Детальніше</a>
    </div>
  </div>
</article>
