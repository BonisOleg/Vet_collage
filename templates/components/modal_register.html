{% load static %}

<!-- Register Modal — Figma: "Долучайтесь до нашої спільноти" -->
<div id="modal-register" class="auth-modal-overlay" role="dialog" aria-modal="true" aria-label="Реєстрація">
  <div class="auth-modal">
    <button class="auth-modal__close" data-modal-close aria-label="Закрити">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

    <!-- Figma: Sexsmith 49.6px "ДОЛУЧАЙТЕСЬ ДО НАШОЇ СПІЛЬНОТИ" -->
    <h2 class="auth-modal__title">Долучайтесь до<br>нашої спільноти</h2>
    <p class="auth-modal__sub">Створіть обліковий запис, щоб отримати доступ до курсів, вебінарів та ресурсів</p>

    <!-- Step 1: choose type — Figma style -->
    <div class="auth-modal__choices" id="register-step-1">
      <button class="auth-modal__choice" data-choice="new">
        Я новий користувач
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M12 1l5 5-5 5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="auth-modal__choice" data-choice="existing" type="button" onclick="window.location.href='{% url 'accounts:login' %}'">
        У мене вже є обліковий запис
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M12 1l5 5-5 5" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
    </div>

    <!-- Step 2: fill form -->
    <div id="register-form-shell" aria-live="polite">
    <form class="auth-modal__form is-hidden" id="register-step-2"
          method="post"
          action="{% url 'accounts:register_step1' %}"
          hx-post="{% url 'accounts:register_step1' %}"
          hx-target="#register-form-shell"
          hx-swap="outerHTML">
      {% csrf_token %}

      <div class="auth-modal__field">
        <input type="text"  name="first_name" placeholder="Ім'я" class="auth-modal__input" required autocomplete="given-name">
      </div>
      <div class="auth-modal__field">
        <input type="text"  name="last_name"  placeholder="Прізвище" class="auth-modal__input" required autocomplete="family-name">
      </div>
      <div class="auth-modal__field">
        <input type="email" name="email"      placeholder="Email" class="auth-modal__input" required autocomplete="email">
      </div>
      <div class="auth-modal__field">
        <input type="password" name="password1" placeholder="Пароль" class="auth-modal__input" required autocomplete="new-password">
      </div>
      <div class="auth-modal__field">
        <input type="password" name="password2" placeholder="Підтвердіть пароль" class="auth-modal__input" required autocomplete="new-password">
      </div>

      <button type="submit" class="auth-modal__btn">Зареєструватись</button>

      <p class="auth-modal__switch">
        Вже маєте акаунт? <a href="{% url 'accounts:login' %}" class="auth-modal__switch-link">Увійти</a>
      </p>
    </form>
    </div>

  </div>
</div>
